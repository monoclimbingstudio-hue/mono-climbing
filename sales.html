<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>売上管理 - Mono Climbing Studio</title>
<style>
:root {
  --accent: #e84c2c;
  --dark: #1a1a1a;
  --mid: #444;
  --light-bg: #f7f7f7;
  --card-bg: #ffffff;
  --border: #e0e0e0;
  --text: #222;
  --sub: #777;
  --success: #2e7d32;
  --radius: 10px;
  --store-bg: #f5f5f5;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--store-bg, var(--light-bg)); color: var(--text); }
body.store-hakata  { --store-bg: #f5f5f5; }
body.store-omura   { --store-bg: #b3e5fc; }
body.store-sasebo  { --store-bg: #c8e6c9; }
nav { background: var(--dark); display: flex; align-items: center; padding: 0 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.3); }
nav .logo { color: #fff; font-size: 0.8rem; font-weight: 700; letter-spacing: .05em; padding: 12px 12px 12px 0; margin-right: 8px; border-right: 1px solid #444; white-space: nowrap; }
nav a { color: #aaa; text-decoration: none; padding: 14px 14px; font-size: 0.85rem; border-bottom: 3px solid transparent; transition: all .15s; white-space: nowrap; }
nav a.active { color: #fff; border-bottom-color: var(--accent); }
nav a:hover { color: #fff; }
.page { max-width: 900px; margin: 0 auto; padding: 16px 14px 60px; }
.section { margin-bottom: 14px; }
.section-head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.section-badge { padding: 3px 10px; border-radius: 100px; background: var(--dark); color: #fff; font-size: 0.75rem; font-weight: 700; }
.section-title { font-size: 0.95rem; font-weight: 700; color: var(--text); }
.card { background: var(--card-bg); border-radius: var(--radius); padding: 14px 16px; box-shadow: 0 1px 4px rgba(0,0,0,.07); }

/* Filter bar */
.filter-bar { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
.filter-field { display: flex; flex-direction: column; gap: 5px; }
.field-label { font-size: 0.78rem; color: var(--sub); font-weight: 500; }
.filter-input { padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 0.92rem; outline: none; transition: border .15s; }
.filter-input:focus { border-color: var(--dark); }
.load-btn { padding: 11px 24px; background: var(--dark); color: #fff; font-size: 0.92rem; font-weight: 700; border: none; border-radius: 8px; cursor: pointer; transition: opacity .15s; white-space: nowrap; }
.load-btn:hover { opacity: .8; }

/* Summary grid */
.summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 0; }
@media(max-width:600px){ .summary-grid { grid-template-columns: repeat(2,1fr); } }
.summary-card { background: var(--card-bg); border-radius: var(--radius); padding: 14px 16px; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
.summary-card .s-label { font-size: 0.75rem; color: var(--sub); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 4px; }
.summary-card .s-value { font-size: 1.5rem; font-weight: 800; color: var(--dark); }
.summary-card .s-unit { font-size: 0.85rem; font-weight: 600; }
.summary-card.highlight { background: var(--dark); }
.summary-card.highlight .s-label { color: #888; }
.summary-card.highlight .s-value { color: #fff; }

/* Table */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 0.85rem; min-width: 640px; }
thead th { background: #f5f5f5; padding: 9px 12px; text-align: left; border-bottom: 2px solid var(--border); font-weight: 700; color: var(--mid); font-size: 0.78rem; text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }
tbody td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; white-space: nowrap; }
tbody tr:hover td { background: #fafafa; }
tbody tr:last-child td { border-bottom: none; }
.pay-tag { display: inline-block; border-radius: 4px; padding: 2px 8px; font-size: 0.76rem; font-weight: 600; }
.pay-cash { background: #e8f5e9; color: #2e7d32; }
.pay-credit { background: #e3f2fd; color: #1565c0; }
.pay-emoney { background: #fff3e0; color: #e65100; }
.pay-qr { background: #f3e5f5; color: #6a1b9a; }
.pay-transit { background: #e0f7fa; color: #006064; }
.num-cell { text-align: right; font-variant-numeric: tabular-nums; }
.empty-state { text-align: center; padding: 40px 0; color: var(--sub); font-size: 0.88rem; }

/* Transfer */
.transfer-btn { padding: 13px 28px; background: var(--success); color: #fff; font-size: 0.95rem; font-weight: 700; border: none; border-radius: var(--radius); cursor: pointer; transition: opacity .15s; }
.transfer-btn:hover { opacity: .85; }
.transfer-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.transfer-msg { margin-top: 10px; padding: 10px 14px; border-radius: 8px; font-size: 0.9rem; font-weight: 600; display: none; }
.transfer-msg.ok { background: #e8f5e9; color: var(--success); display: block; }
.transfer-msg.err { background: #fdecea; color: #c62828; display: block; }
.warn-note { font-size: 0.82rem; color: #c62828; margin-top: 6px; }

.dot-loader { display: flex; gap: 4px; }
.dot-loader span { width: 6px; height: 6px; border-radius: 50%; background: var(--sub); animation: bounce .9s infinite; }
.dot-loader span:nth-child(2) { animation-delay: .15s; }
.dot-loader span:nth-child(3) { animation-delay: .3s; }
@keyframes bounce { 0%,80%,100%{transform:scale(.6);opacity:.4} 40%{transform:scale(1);opacity:1} }

</style>
</head>
<body class="store-hakata">

<!-- Login Overlay -->
<div id="loginOverlay" style="position:fixed;inset:0;z-index:9999;background:rgba(26,26,26,.95);display:flex;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:16px;padding:36px 32px;width:100%;max-width:340px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.4);">
    <div style="font-size:2rem;margin-bottom:8px;">🧗</div>
    <div style="font-size:1.1rem;font-weight:800;color:#1a1a1a;margin-bottom:4px;">Mono Climbing Studio</div>
    <div style="font-size:0.82rem;color:#777;margin-bottom:24px;">管理システム</div>
    <input type="password" id="loginPass" placeholder="パスワードを入力" style="width:100%;padding:12px 14px;border:1.5px solid #ddd;border-radius:8px;font-size:1rem;outline:none;margin-bottom:12px;text-align:center;" autofocus>
    <button id="loginBtn" style="width:100%;padding:13px;background:#1a1a1a;color:#fff;font-size:0.95rem;font-weight:700;border:none;border-radius:8px;cursor:pointer;">ログイン</button>
    <div id="loginErr" style="color:#c62828;font-size:0.82rem;margin-top:10px;min-height:1.2em;"></div>
  </div>
</div>
<script>
(function(){
  var PASS = 'mono';
  if (sessionStorage.getItem('mono_auth') === '1') {
    document.getElementById('loginOverlay').style.display = 'none';
    return;
  }
  document.getElementById('loginBtn').addEventListener('click', doLogin);
  document.getElementById('loginPass').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
  function doLogin(){
    var v = document.getElementById('loginPass').value;
    if (v === PASS) {
      sessionStorage.setItem('mono_auth', '1');
      document.getElementById('loginOverlay').style.display = 'none';
    } else {
      document.getElementById('loginErr').textContent = 'パスワードが正しくありません';
      document.getElementById('loginPass').value = '';
      document.getElementById('loginPass').focus();
    }
  }
})();
</script>

<nav>
  <div class="logo">🧗 MONO</div>
  <a href="index.html">入店登録</a>
  <a href="members.html">会員管理</a>
  <a href="sales.html" class="active">売上管理</a>
  <a href="shop.html">物販管理</a>
</nav>

<div class="page">

  <!-- 絞り込み -->
  <div class="section">
    <div class="section-head">
      <span class="section-badge">FILTER</span>
      <div class="section-title">表示条件</div>
    </div>
    <div class="card">
      <div class="filter-bar">
        <div class="filter-field">
          <div class="field-label">日付</div>
          <input type="date" id="dateInput" class="filter-input">
        </div>
        <div class="filter-field">
          <div class="field-label">店舗</div>
          <select id="storeFilter" class="filter-input">
            <option value="">全店舗</option>
            <option value="hakata">博多店</option>
            <option value="omura">大村店</option>
            <option value="sasebo">佐世保店</option>
          </select>
        </div>
        <button class="load-btn" id="loadBtn">表示する</button>
      </div>
    </div>
  </div>

  <!-- サマリー -->
  <div class="section" id="summarySection" style="display:none;">
    <div class="section-head">
      <span class="section-badge">SUMMARY</span>
      <div class="section-title">売上サマリー</div>
    </div>
    <div class="summary-grid">
      <div class="summary-card">
        <div class="s-label">来客数</div>
        <div class="s-value"><span id="sCount">0</span><span class="s-unit"> 名</span></div>
      </div>
      <div class="summary-card">
        <div class="s-label">利用料</div>
        <div class="s-value"><span class="s-unit">¥</span><span id="sUsage">0</span></div>
      </div>
      <div class="summary-card">
        <div class="s-label">レンタル</div>
        <div class="s-value"><span class="s-unit">¥</span><span id="sRental">0</span></div>
      </div>
      <div class="summary-card highlight">
        <div class="s-label">売上合計</div>
        <div class="s-value"><span class="s-unit">¥</span><span id="sTotal">0</span></div>
      </div>
    </div>
  </div>

  <!-- 入店一覧 -->
  <div class="section">
    <div class="section-head">
      <span class="section-badge">LIST</span>
      <div class="section-title">入店一覧</div>
    </div>
    <div class="card">
      <div id="salesTableWrap">
        <div class="empty-state">日付を選択して「表示する」を押してください</div>
      </div>
    </div>
  </div>

  <!-- スプレッドシート転記 -->
  <div class="section" id="transferSection" style="display:none;">
    <div class="section-head">
      <span class="section-badge">EXPORT</span>
      <div class="section-title">スプレッドシートへ転記</div>
    </div>
    <div class="card">
      <p style="font-size:.88rem;color:var(--sub);margin-bottom:12px;">表示中のデータを「売上集計」シートに書き出します。</p>
      <p class="warn-note">⚠ 同じ日付のデータを再転記すると重複します。</p>
      <div style="margin-top:14px;">
        <button class="transfer-btn" id="transferBtn">売上を転記する</button>
      </div>
      <div id="transferMsg" class="transfer-msg"></div>
    </div>
  </div>

</div>

<script>
var currentEntries = [];

// Init date
(function(){
  var d = new Date();
  var y = d.getFullYear();
  var m = String(d.getMonth()+1).padStart(2,'0');
  var day = String(d.getDate()).padStart(2,'0');
  document.getElementById('dateInput').value = y+'-'+m+'-'+day;
})();

function callAPI(action, params) {
  return fetch('/api/gas', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(Object.assign({action:action}, params))
  }).then(function(r){ return r.json(); });
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

document.getElementById('loadBtn').addEventListener('click', loadSales);
document.getElementById('dateInput').addEventListener('keydown', function(e){ if(e.key==='Enter') loadSales(); });

function loadSales() {
  var dateVal = document.getElementById('dateInput').value;
  var store = document.getElementById('storeFilter').value;
  if(!dateVal){ alert('日付を選択してください'); return; }

  var wrap = document.getElementById('salesTableWrap');
  wrap.innerHTML = '<div style="display:flex;align-items:center;gap:10px;color:var(--sub);font-size:.88rem;padding:20px 0;"><div class="dot-loader"><span></span><span></span><span></span></div>データを読み込み中...</div>';
  document.getElementById('summarySection').style.display = 'none';
  document.getElementById('transferSection').style.display = 'none';

  callAPI('getTodaySales', {date:dateVal, store:store}).then(function(res){
    // Robust check: ensure we have an array
    var data = res.data;
    if(!Array.isArray(data)) {
      var errMsg = (data && data.error) ? data.error : (res.error || 'データ形式エラー');
      wrap.innerHTML = '<div class="empty-state" style="color:#c62828">エラー: ' + esc(errMsg) + '</div>';
      return;
    }
    currentEntries = data;
    renderSalesTable(currentEntries);
    if(currentEntries.length > 0) {
      renderSummary(currentEntries);
      document.getElementById('summarySection').style.display = 'block';
      document.getElementById('transferSection').style.display = 'block';
    }
  }).catch(function(e){
    wrap.innerHTML = '<div class="empty-state" style="color:#c62828">エラー: ' + esc(e.message) + '</div>';
  });
}

function renderSalesTable(entries) {
  var wrap = document.getElementById('salesTableWrap');
  if(!entries.length){
    wrap.innerHTML = '<div class="empty-state">この日付のデータがありません</div>';
    return;
  }
  var html = '<div class="table-wrap"><table><thead><tr>'
    + '<th>時間</th><th>店舗</th><th>会員番号</th><th>氏名</th>'
    + '<th>プラン</th><th class="num-cell">利用料</th><th class="num-cell">レンタル</th>'
    + '<th class="num-cell">合計</th><th>支払</th>'
    + '</tr></thead><tbody>';
  entries.forEach(function(e){
    html += '<tr>'
      + '<td>' + esc(e.time||'-') + '</td>'
      + '<td>' + esc(storeLabel(e.store)) + '</td>'
      + '<td style="font-family:monospace;font-weight:700;">' + esc(e.memberCode||'-') + '</td>'
      + '<td>' + esc(e.memberName||'ゲスト') + '</td>'
      + '<td>' + esc(e.planLabel||'-') + '</td>'
      + '<td class="num-cell">¥' + Number(e.usageFee||0).toLocaleString() + '</td>'
      + '<td class="num-cell">' + (Number(e.rentalFee)>0 ? '¥'+Number(e.rentalFee).toLocaleString() : '-') + '</td>'
      + '<td class="num-cell" style="font-weight:700;">¥' + Number(e.total||0).toLocaleString() + '</td>'
      + '<td>' + payTag(e.payment) + '</td>'
      + '</tr>';
  });
  html += '</tbody></table></div>';
  wrap.innerHTML = html;
}

function renderSummary(entries) {
  var usage=0, rental=0, total=0;
  entries.forEach(function(e){
    usage  += Number(e.usageFee||0);
    rental += Number(e.rentalFee||0);
    total  += Number(e.total||0);
  });
  document.getElementById('sCount').textContent  = entries.length;
  document.getElementById('sUsage').textContent  = usage.toLocaleString();
  document.getElementById('sRental').textContent = rental.toLocaleString();
  document.getElementById('sTotal').textContent  = total.toLocaleString();
}

function payTag(method) {
  var cls = {
    '現金':'pay-cash','クレジット':'pay-credit',
    '電子マネー':'pay-emoney','QRコード':'pay-qr','交通系IC':'pay-transit'
  }[method] || '';
  return '<span class="pay-tag ' + cls + '">' + esc(method||'-') + '</span>';
}

function storeLabel(s){
  return {hakata:'博多店', omura:'大村店', sasebo:'佐世保店'}[s] || s || '-';
}

// Transfer
document.getElementById('transferBtn').addEventListener('click', function(){
  if(!currentEntries.length){ alert('転記するデータがありません'); return; }
  var dateVal = document.getElementById('dateInput').value;
  var store = document.getElementById('storeFilter').value;
  var msg = document.getElementById('transferMsg');
  var btn = this;
  msg.className = 'transfer-msg';
  msg.style.display = 'none';
  btn.disabled = true;
  btn.textContent = '転記中...';
  callAPI('transferSales', {date:dateVal, store:store}).then(function(res){
    btn.textContent = '売上を転記する';
    if(res.ok && res.data && res.data.success){
      msg.className = 'transfer-msg ok';
      msg.style.display = '';
      msg.textContent = '✓ 転記しました（' + (res.data.rows || currentEntries.length) + '件 → 売上集計シート）';
      btn.disabled = true; // 二重転記防止
    } else {
      // エラー詳細を表示（デバッグ用にレスポンズ全体を確認）
      var errDetail = '';
      if (res.data && res.data.error) {
        errDetail = res.data.error;
      } else if (res.error) {
        errDetail = res.error;
      } else {
        errDetail = 'サーバーからの応答: ' + JSON.stringify(res);
      }
      msg.className = 'transfer-msg err';
      msg.style.display = '';
      msg.textContent = 'エラー: ' + errDetail;
      btn.disabled = false;
    }
  }).catch(function(e){
    btn.textContent = '売上を転記する';
    btn.disabled = false;
    msg.className = 'transfer-msg err';
    msg.style.display = '';
    msg.textContent = 'エラー: ' + e.message;
  });
});

// Store filter → background color change
document.getElementById('storeFilter').addEventListener('change', function(){
  var store = this.value;
  document.body.className = document.body.className.replace(/store-\S+/g, '').trim();
  if (store) {
    document.body.classList.add('store-' + store);
  } else {
    document.body.classList.add('store-hakata');
  }
});

</script>
</body>
</html>
