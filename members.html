<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>会員管理 - Mono Climbing Studio</title>
<style>
:root {
  --accent: #e84c2c;
  --dark: #1a1a1a;
  --mid: #444;
  --light-bg: #f7f7f7;
  --card-bg: #ffffff;
  --border: #e0e0e0;
  --text: #222;
  --sub: #777;
  --success: #2e7d32;
  --radius: 10px;
  --store-bg: var(--light-bg);
}
body.store-hakata  { --store-bg: #bbdefb; }
body.store-omura   { --store-bg: #c8e6c9; }
body.store-sasebo  { --store-bg: #ffe0b2; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--store-bg); color: var(--text); transition: background .3s; }

nav { background: var(--dark); display: flex; align-items: center; padding: 0 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.3); }
nav .logo { color: #fff; font-size: 0.8rem; font-weight: 700; letter-spacing: .05em; padding: 12px 12px 12px 0; margin-right: 8px; border-right: 1px solid #444; white-space: nowrap; }
nav a { color: #aaa; text-decoration: none; padding: 14px 14px; font-size: 0.85rem; border-bottom: 3px solid transparent; transition: all .15s; white-space: nowrap; }
nav a.active { color: #fff; border-bottom-color: var(--accent); }
nav a:hover { color: #fff; }

.page { max-width: 680px; margin: 0 auto; padding: 16px 14px 60px; }
.section { margin-bottom: 14px; }
.section-head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.step-num { width: 26px; height: 26px; border-radius: 50%; background: var(--dark); color: #fff; font-size: 0.78rem; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.step-badge { padding: 3px 10px; border-radius: 100px; background: var(--dark); color: #fff; font-size: 0.75rem; font-weight: 700; }
.section-title { font-size: 0.95rem; font-weight: 700; color: var(--text); }
.card { background: var(--card-bg); border-radius: var(--radius); padding: 14px 16px; box-shadow: 0 1px 4px rgba(0,0,0,.07); }

/* Store tabs */
.store-tabs { display: flex; gap: 8px; }
.store-tab { flex: 1; padding: 11px 8px; border: 2px solid var(--border); border-radius: 8px; background: #fff; cursor: pointer; font-size: 0.88rem; font-weight: 600; text-align: center; transition: all .15s; color: var(--mid); }
.store-tab.sel { background: var(--dark); color: #fff; border-color: var(--dark); }
.store-tab[data-store="hakata"].sel { background: #1a73e8; border-color: #1a73e8; }
.store-tab[data-store="omura"].sel  { background: #2e7d32; border-color: #2e7d32; }
.store-tab[data-store="sasebo"].sel { background: #e65100; border-color: #e65100; }
.store-tab:hover:not(.sel) { border-color: #aaa; }

/* Store indicator badge */
.store-badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px; border-radius: 100px;
  background: #eef; color: #334;
  font-size: 0.75rem; font-weight: 700;
  margin-left: auto;
}

/* Inputs */
.input-row { display: flex; gap: 8px; align-items: stretch; }
.input-row input { flex: 1; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 0.92rem; outline: none; transition: border .15s; }
.input-row input:focus { border-color: var(--dark); }
.search-btn { padding: 0 18px; border: 1.5px solid var(--dark); border-radius: 8px; background: var(--dark); color: #fff; cursor: pointer; font-size: 0.88rem; white-space: nowrap; transition: opacity .15s; }
.search-btn:hover { opacity: .8; }
.result-box { margin-top: 10px; padding: 10px 14px; border-radius: 8px; font-size: 0.9rem; font-weight: 600; display: none; }
.result-box.found { background: #e8f5e9; color: var(--success); display: block; }
.result-box.notfound { background: #f5f5f5; color: var(--sub); display: block; }

.field-label { font-size: 0.79rem; color: var(--sub); margin-bottom: 5px; font-weight: 500; }
.form-grid { display: grid; grid-template-columns: 140px 1fr; gap: 10px; margin-bottom: 12px; }
.full-input { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 0.92rem; outline: none; transition: border .15s; }
.full-input:focus { border-color: var(--dark); }
.action-btn { width: 100%; padding: 13px; background: var(--accent); color: #fff; font-size: 0.95rem; font-weight: 700; border: none; border-radius: var(--radius); cursor: pointer; transition: opacity .15s; }
.action-btn:hover { opacity: .88; }
.action-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.msg-box { margin-top: 10px; padding: 10px 14px; border-radius: 8px; font-size: 0.88rem; font-weight: 600; display: none; }
.msg-box.ok { background: #e8f5e9; color: var(--success); display: block; }
.msg-box.err { background: #fdecea; color: #c62828; display: block; }

/* List */
.list-toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.filter-input { flex: 1; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 0.9rem; outline: none; transition: border .15s; }
.filter-input:focus { border-color: var(--dark); }
.reload-btn { padding: 9px 14px; border: 1.5px solid var(--border); border-radius: 8px; background: #fff; cursor: pointer; font-size: 0.85rem; color: var(--mid); transition: all .15s; white-space: nowrap; }
.reload-btn:hover { border-color: var(--dark); background: var(--dark); color: #fff; }
.load-list-btn { width: 100%; padding: 13px; background: var(--dark); color: #fff; font-size: 0.92rem; font-weight: 700; border: none; border-radius: var(--radius); cursor: pointer; transition: opacity .15s; }
.load-list-btn:hover { opacity: .8; }
.member-count { font-size: 0.8rem; color: var(--sub); margin-bottom: 10px; font-weight: 500; }

table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
thead th { background: #f5f5f5; padding: 9px 12px; text-align: left; border-bottom: 2px solid var(--border); font-weight: 700; color: var(--mid); font-size: 0.8rem; text-transform: uppercase; letter-spacing: .04em; }
tbody td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; }
tbody tr:hover td { background: #fafafa; }
tbody tr:last-child td { border-bottom: none; }
.code-cell { font-family: monospace; font-size: 0.9rem; font-weight: 700; color: var(--dark); }
.empty-state { text-align: center; padding: 40px 0; color: var(--sub); font-size: 0.88rem; }
.not-loaded-state { text-align: center; padding: 30px 0; color: var(--sub); font-size: 0.88rem; }

/* Row action buttons */
.row-actions { display: flex; gap: 6px; }
.row-edit-btn, .row-del-btn {
  padding: 5px 11px; font-size: 0.78rem; font-weight: 700;
  border-radius: 6px; cursor: pointer; border: 1.5px solid; transition: all .15s;
  white-space: nowrap;
}
.row-edit-btn { border-color: var(--dark); color: var(--dark); background: #fff; }
.row-edit-btn:hover { background: var(--dark); color: #fff; }
.row-del-btn { border-color: #e53935; color: #e53935; background: #fff; }
.row-del-btn:hover { background: #fdecea; }

/* Edit modal overlay */
#editModal {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,.45);
  display: none; align-items: center; justify-content: center;
}
#editModal.open { display: flex; }
.modal-box {
  background: #fff; border-radius: 14px;
  padding: 28px 26px; width: 100%; max-width: 400px;
  box-shadow: 0 8px 40px rgba(0,0,0,.3);
}
.modal-title { font-size: 1rem; font-weight: 800; color: var(--dark); margin-bottom: 18px; }
.modal-field-label { font-size: 0.79rem; color: var(--sub); margin-bottom: 5px; font-weight: 500; }
.modal-input { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 0.95rem; outline: none; transition: border .15s; margin-bottom: 14px; }
.modal-input:focus { border-color: var(--dark); }
.modal-btns { display: flex; gap: 10px; }
.modal-save-btn { flex: 1; padding: 12px; background: var(--accent); color: #fff; font-size: 0.92rem; font-weight: 700; border: none; border-radius: 8px; cursor: pointer; transition: opacity .15s; }
.modal-save-btn:hover { opacity: .88; }
.modal-cancel-btn { padding: 12px 18px; background: #fff; color: var(--mid); font-size: 0.92rem; font-weight: 600; border: 1.5px solid var(--border); border-radius: 8px; cursor: pointer; transition: all .15s; }
.modal-cancel-btn:hover { border-color: var(--dark); }
.modal-msg { margin-top: 10px; font-size: 0.85rem; font-weight: 600; min-height: 18px; }
.modal-msg.err { color: #c62828; }
.modal-msg.ok { color: var(--success); }

.dot-loader { display: flex; gap: 4px; }
.dot-loader span { width: 6px; height: 6px; border-radius: 50%; background: var(--sub); animation: bounce .9s infinite; }
.dot-loader span:nth-child(2) { animation-delay: .15s; }
.dot-loader span:nth-child(3) { animation-delay: .3s; }
@keyframes bounce { 0%,80%,100%{transform:scale(.6);opacity:.4} 40%{transform:scale(1);opacity:1} }

</style>
</head>
<body class="store-hakata">

<!-- Login Overlay -->
<div id="loginOverlay" style="position:fixed;inset:0;z-index:9999;background:rgba(26,26,26,.95);display:flex;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:16px;padding:36px 32px;width:100%;max-width:340px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.4);">
    <div style="font-size:2rem;margin-bottom:8px;">🧗</div>
    <div style="font-size:1.1rem;font-weight:800;color:#1a1a1a;margin-bottom:4px;">Mono Climbing Studio</div>
    <div style="font-size:0.82rem;color:#777;margin-bottom:24px;">管理システム</div>
    <input type="password" id="loginPass" placeholder="パスワードを入力" style="width:100%;padding:12px 14px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:0.95rem;outline:none;margin-bottom:12px;text-align:center;">
    <button id="loginBtn" style="width:100%;padding:13px;background:#1a1a1a;color:#fff;font-size:0.95rem;font-weight:700;border:none;border-radius:10px;cursor:pointer;">ログイン</button>
    <div id="loginErr" style="margin-top:10px;font-size:0.82rem;color:#c62828;font-weight:600;min-height:18px;"></div>
  </div>
</div>
<script>
(function(){
  var PASS = 'mono';
  if (sessionStorage.getItem('mono_auth') === '1') {
    document.getElementById('loginOverlay').style.display = 'none';
    return;
  }
  document.getElementById('loginBtn').addEventListener('click', doLogin);
  document.getElementById('loginPass').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
  function doLogin(){
    var v = document.getElementById('loginPass').value;
    if (v === PASS) {
      sessionStorage.setItem('mono_auth', '1');
      document.getElementById('loginOverlay').style.display = 'none';
    } else {
      document.getElementById('loginErr').textContent = 'パスワードが正しくありません';
      document.getElementById('loginPass').value = '';
      document.getElementById('loginPass').focus();
    }
  }
})();
</script>

</div>

<div class="page">

  <!-- 店舗選択 -->
  <div class="section">
    <div class="section-head">
      <div class="step-num">店</div>
      <div class="section-title">店舗を選択</div>
    </div>
    <div class="card">
      <div class="store-tabs">
        <button class="store-tab sel" data-store="hakata">博多店</button>
        <button class="store-tab" data-store="omura">大村店</button>
        <button class="store-tab" data-store="sasebo">佐世保店</button>
      </div>
    </div>
  </div>

  <!-- 会員検索 -->
  <div class="section">
    <div class="section-head">
      <span class="step-badge">SEARCH</span>
      <div class="section-title">会員番号で検索</div>
      <span class="store-badge" id="searchStoreBadge">📍 博多店</span>
    </div>
    <div class="card">
      <div class="input-row">
        <input type="text" id="searchCode" placeholder="会員番号を入力（例: 1234）" inputmode="numeric">
        <button class="search-btn" id="searchBtn">検索</button>
      </div>
      <div id="searchResult" class="result-box"></div>
    </div>
  </div>

  <!-- 新規会員追加 -->
  <div class="section">
    <div class="section-head">
      <span class="step-badge">ADD</span>
      <div class="section-title">新規会員を追加</div>
      <span class="store-badge" id="addStoreBadge">📍 博多店</span>
    </div>
    <div class="card">
      <div class="form-grid">
        <div>
          <div class="field-label">会員番号</div>
          <input type="text" id="addCode" class="full-input" placeholder="例: 1234" inputmode="numeric">
        </div>
        <div>
          <div class="field-label">氏名</div>
          <input type="text" id="addName" class="full-input" placeholder="例: 山田 太郎">
        </div>
      </div>
      <button class="action-btn" id="addBtn">会員を追加する</button>
      <div id="msgAdd" class="msg-box"></div>
    </div>
  </div>

  <!-- 会員一覧（遅延ロード・編集/削除対応） -->
  <div class="section">
    <div class="section-head">
      <span class="step-badge">LIST</span>
      <div class="section-title">会員一覧</div>
      <span class="store-badge" id="listStoreBadge">📍 博多店</span>
    </div>
    <div class="card">
      <div id="listToolbar" style="display:none;">
        <div class="list-toolbar">
          <input type="text" id="listFilter" class="filter-input" placeholder="🔍  番号または氏名で絞り込み...">
          <button class="reload-btn" id="reloadBtn">↻ 再読込</button>
        </div>
      </div>
      <div id="memberCount" class="member-count"></div>
      <div id="memberTableWrap">
        <div class="not-loaded-state">
          <p style="margin-bottom:14px;color:var(--sub);">会員一覧を表示するには読み込みボタンを押してください</p>
          <button class="load-list-btn" id="loadListBtn">📋 会員一覧を読み込む</button>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
var allMembers = [];
var membersLoaded = false;
var STORE_LABEL = {hakata: '博多店', omura: '大村店', sasebo: '佐世保店'};

function callAPI(action, params) {
  return fetch('/api/gas', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify(Object.assign({action: action}, params))
  }).then(function(r){ return r.json(); });
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function getStore() {
  var sel = document.querySelector('.store-tab.sel');
  return sel ? sel.dataset.store : 'hakata';
}

function getStoreLabel() {
  return STORE_LABEL[getStore()] || getStore();
}

function updateStoreBadges() {
  var label = '📍 ' + getStoreLabel();
  document.getElementById('searchStoreBadge').textContent = label;
  document.getElementById('addStoreBadge').textContent = label;
  document.getElementById('listStoreBadge').textContent = label;
}

// Store tabs
document.querySelectorAll('.store-tab').forEach(function(btn){
  btn.addEventListener('click', function(){
    document.querySelectorAll('.store-tab').forEach(function(b){ b.classList.remove('sel'); });
    btn.classList.add('sel');
    document.body.className = document.body.className.replace(/store-\S+/g, '').trim();
    document.body.classList.add('store-' + btn.dataset.store);
    updateStoreBadges();
    var sr = document.getElementById('searchResult');
    sr.className = 'result-box'; sr.style.display = 'none';
    document.getElementById('searchCode').value = '';
    if (membersLoaded) {
      document.getElementById('listFilter').value = '';
      loadMembers();
    }
  });
});

// ── SEARCH ──────────────────────────────────────
document.getElementById('searchBtn').addEventListener('click', function(){
  var code = document.getElementById('searchCode').value.trim();
  if (!code) { alert('会員番号を入力してください'); return; }
  var result = document.getElementById('searchResult');
  result.className = 'result-box notfound';
  result.textContent = '検索中...';
  result.style.display = 'block';
  callAPI('getMember', {code: code, store: getStore()}).then(function(res){
    var m = res.data;
    if (m && m.name) {
      result.className = 'result-box found';
      result.innerHTML = '✓&nbsp; <strong>' + esc(m.name) + '</strong>　（会員番号: ' + esc(code) + '）';
    } else {
      result.className = 'result-box notfound';
      result.textContent = getStoreLabel() + ' に会員番号 ' + code + ' は未登録です';
    }
  }).catch(function(e){
    result.className = 'result-box notfound';
    result.textContent = 'エラー: ' + e.message;
  });
});
document.getElementById('searchCode').addEventListener('keydown', function(e){
  if (e.key === 'Enter') document.getElementById('searchBtn').click();
});

// ── ADD MEMBER ───────────────────────────────────
document.getElementById('addBtn').addEventListener('click', function(){
  var code = document.getElementById('addCode').value.trim();
  var name = document.getElementById('addName').value.trim();
  if (!code || !name) { alert('会員番号と氏名を両方入力してください'); return; }
  var store = getStore();
  var msg = document.getElementById('msgAdd');
  msg.className = 'msg-box'; msg.style.display = 'none';
  this.disabled = true; this.textContent = '登録中...';
  var self = this;
  callAPI('addMember', {code: code, name: name, store: store}).then(function(res){
    self.disabled = false; self.textContent = '会員を追加する';
    if (res.ok && res.data && res.data.success) {
      msg.className = 'msg-box ok';
      msg.textContent = '✓ ' + getStoreLabel() + ' に登録しました（' + code + ' / ' + name + '）';
      document.getElementById('addCode').value = '';
      document.getElementById('addName').value = '';
      if (membersLoaded) loadMembers();
    } else {
      msg.className = 'msg-box err';
      msg.textContent = 'エラー: ' + (res.data ? res.data.error : res.error || '不明');
    }
  }).catch(function(e){
    self.disabled = false; self.textContent = '会員を追加する';
    var msg2 = document.getElementById('msgAdd');
    msg2.className = 'msg-box err';
    msg2.textContent = 'エラー: ' + e.message;
  });
});

// ── LOAD MEMBERS ─────────────────
document.getElementById('loadListBtn').addEventListener('click', function(){
  loadMembers();
});

function loadMembers(){
  var wrap = document.getElementById('memberTableWrap');
  var count = document.getElementById('memberCount');
  count.textContent = '';
  wrap.innerHTML = '<div style="display:flex;align-items:center;gap:10px;color:var(--sub);font-size:.88rem;padding:20px 0;"><div class="dot-loader"><span></span><span></span><span></span></div>読み込み中...</div>';
  document.getElementById('listToolbar').style.display = 'none';

  callAPI('getMemberList', {store: getStore()}).then(function(res){
    allMembers = (res.data && Array.isArray(res.data)) ? res.data : [];
    membersLoaded = true;
    document.getElementById('listToolbar').style.display = 'block';
    renderMemberTable(allMembers);
  }).catch(function(e){
    wrap.innerHTML = '<div class="empty-state" style="color:#c62828">エラー: ' + esc(e.message) + '</div>';
  });
}

function renderMemberTable(members){
  var wrap = document.getElementById('memberTableWrap');
  var count = document.getElementById('memberCount');
  count.textContent = getStoreLabel() + '  ' + members.length + ' 名';
  if (!members.length) {
    wrap.innerHTML = '<div class="empty-state">' + getStoreLabel() + ' の会員データがありません</div>';
    return;
  }
  var html = '<table><thead><tr><th>会員番号</th><th>氏名</th><th>登録日</th><th>操作</th></tr></thead><tbody>';
  members.forEach(function(m){
    var code = esc(String(m.code));
    var name = esc(m.name || '');
    html += '<tr>' +
      '<td class="code-cell">' + code + '</td>' +
      '<td>' + name + '</td>' +
      '<td style="color:var(--sub);font-size:.82rem;">' + esc(m.joinDate || '') + '</td>' +
      '<td><div class="row-actions">' +
        '<button class="row-edit-btn" data-code="' + code + '" data-name="' + name + '">編集</button>' +
        '<button class="row-del-btn" data-code="' + code + '" data-name="' + name + '">削除</button>' +
      '</div></td>' +
      '</tr>';
  });
  html += '</tbody></table>';
  wrap.innerHTML = html;

  wrap.querySelectorAll('.row-edit-btn').forEach(function(btn){
    btn.addEventListener('click', function(){
      openEditModal(this.dataset.code, this.dataset.name);
    });
  });

  wrap.querySelectorAll('.row-del-btn').forEach(function(btn){
    btn.addEventListener('click', function(){
      deleteMember(this.dataset.code, this.dataset.name);
    });
  });
}

// ── 編集モーダル ──────────────────────────────────
function openEditModal(code, currentName) {
  document.getElementById('editCode').value = code;
  document.getElementById('editName').value = currentName;
  document.getElementById('editModalMsg').textContent = '';
  document.getElementById('editModalMsg').className = 'modal-msg';
  document.getElementById('editModal').classList.add('open');
  document.getElementById('editName').focus();
  document.getElementById('editName').select();
}

document.getElementById('editCancelBtn').addEventListener('click', function(){
  document.getElementById('editModal').classList.remove('open');
});

document.getElementById('editModal').addEventListener('click', function(e){
  if (e.target === this) this.classList.remove('open');
});

document.getElementById('editSaveBtn').addEventListener('click', function(){
  var code = document.getElementById('editCode').value.trim();
  var newName = document.getElementById('editName').value.trim();
  var msgEl = document.getElementById('editModalMsg');
  if (!newName) { msgEl.className = 'modal-msg err'; msgEl.textContent = '氏名を入力してください'; return; }

  if (!confirm('会員番号 ' + code + ' の氏名を\n「' + newName + '」に上書きしますか？')) return;

  var saveBtn = this;
  saveBtn.disabled = true; saveBtn.textContent = '保存中...';
  msgEl.textContent = '';

  callAPI('updateMember', {code: code, name: newName, store: getStore()}).then(function(res){
    saveBtn.disabled = false; saveBtn.textContent = '上書き保存する';
    if (res.ok && res.data && res.data.success) {
      document.getElementById('editModal').classList.remove('open');
      if (membersLoaded) loadMembers();
    } else {
      msgEl.className = 'modal-msg err';
      msgEl.textContent = 'エラー: ' + (res.data ? res.data.error : res.error || '不明');
    }
  }).catch(function(e){
    saveBtn.disabled = false; saveBtn.textContent = '上書き保存する';
    msgEl.className = 'modal-msg err';
    msgEl.textContent = 'エラー: ' + e.message;
  });
});

// ── 会員削除 ──────────────────────────────────────
function deleteMember(code, name) {
  if (!confirm('会員番号 ' + code + '「' + name + '」を削除しますか？\nこの操作は取り消せません。')) return;
  callAPI('deleteMember', {code: code, store: getStore()}).then(function(res){
    if (res.ok && res.data && res.data.success) {
      if (membersLoaded) loadMembers();
    } else {
      alert('削除エラー: ' + (res.data ? res.data.error : res.error || '不明'));
    }
  }).catch(function(e){
    alert('削除エラー: ' + e.message);
  });
}

// Filter
document.getElementById('listFilter').addEventListener('input', function(){
  var q = this.value.trim().toLowerCase();
  if (!q) { renderMemberTable(allMembers); return; }
  var filtered = allMembers.filter(function(m){
    return String(m.code).toLowerCase().includes(q) || (m.name||'').toLowerCase().includes(q);
  });
  renderMemberTable(filtered);
});

// Reload button
document.getElementById('reloadBtn').addEventListener('click', function(){
  document.getElementById('listFilter').value = '';
  loadMembers();
});

</script>
</body>
</html>
