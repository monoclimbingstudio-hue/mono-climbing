<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>物販管理 - Mono Climbing Studio</title>
<style>
:root {
  --accent: #e84c2c;
  --dark: #1a1a1a;
  --mid: #444;
  --light-bg: #f7f7f7;
  --card-bg: #ffffff;
  --border: #e0e0e0;
  --text: #222;
  --sub: #777;
  --success: #2e7d32;
  --radius: 10px;
  --store-bg: #f5f5f5;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--store-bg, var(--light-bg)); color: var(--text); }
body.store-all     { --store-bg: #fff; }
body.store-hakata  { --store-bg: #f5f5f5; }
body.store-omura   { --store-bg: #b3e5fc; }
body.store-sasebo  { --store-bg: #c8e6c9; }
nav { background: var(--dark); display: flex; align-items: center; padding: 0 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.3); }
nav .logo { color: #fff; font-size: 0.8rem; font-weight: 700; letter-spacing: .05em; padding: 12px 12px 12px 0; margin-right: 8px; border-right: 1px solid #444; white-space: nowrap; }
nav a { color: #aaa; text-decoration: none; padding: 14px 14px; font-size: 0.85rem; border-bottom: 3px solid transparent; transition: all .15s; white-space: nowrap; }
nav a.active { color: #fff; border-bottom-color: var(--accent); }
nav a:hover { color: #fff; }
.page { max-width: 960px; margin: 0 auto; padding: 16px 14px 60px; }
.section { margin-bottom: 14px; }
.section-head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.section-badge { padding: 3px 10px; border-radius: 100px; background: var(--dark); color: #fff; font-size: 0.75rem; font-weight: 700; }
.section-title { font-size: 0.95rem; font-weight: 700; color: var(--text); }
.card { background: var(--card-bg); border-radius: var(--radius); padding: 14px 16px; box-shadow: 0 1px 4px rgba(0,0,0,.07); }

/* Filter bar */
.filter-bar { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
.filter-field { display: flex; flex-direction: column; gap: 5px; }
.field-label { font-size: 0.78rem; color: var(--sub); font-weight: 500; }
.filter-input { padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 0.92rem; outline: none; transition: border .15s; }
.filter-input:focus { border-color: var(--dark); }
.load-btn { padding: 11px 24px; background: var(--dark); color: #fff; font-size: 0.92rem; font-weight: 700; border: none; border-radius: 8px; cursor: pointer; transition: opacity .15s; white-space: nowrap; }
.load-btn:hover { opacity: .8; }

/* Category tabs */
.cat-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.cat-tab { padding: 8px 16px; border-radius: 100px; border: 1.5px solid var(--border); background: #fff; font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: all .15s; }
.cat-tab.active { background: var(--dark); color: #fff; border-color: var(--dark); }
.cat-tab:hover:not(.active) { border-color: var(--mid); }

/* Summary grid */
.summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 14px; }
@media(max-width:600px){ .summary-grid { grid-template-columns: repeat(2,1fr); } }
.summary-card { background: var(--card-bg); border-radius: var(--radius); padding: 14px 16px; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
.summary-card .s-label { font-size: 0.75rem; color: var(--sub); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 4px; }
.summary-card .s-value { font-size: 1.5rem; font-weight: 800; color: var(--dark); }
.summary-card .s-unit { font-size: 0.85rem; font-weight: 600; }
.summary-card.highlight { background: var(--dark); }
.summary-card.highlight .s-label { color: #888; }
.summary-card.highlight .s-value { color: #fff; }

/* Table */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 0.85rem; min-width: 640px; }
thead th { background: #f5f5f5; padding: 9px 12px; text-align: left; border-bottom: 2px solid var(--border); font-weight: 700; color: var(--mid); font-size: 0.78rem; text-transform: uppercase; letter-spacing: .04em; white-space: nowrap; }
tbody td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; white-space: nowrap; }
tbody tr:hover td { background: #fafafa; }
tbody tr:last-child td { border-bottom: none; }
.num-cell { text-align: right; font-variant-numeric: tabular-nums; }
.empty-state { text-align: center; padding: 40px 0; color: var(--sub); font-size: 0.88rem; }

/* Stock indicator */
.stock-ok { color: var(--success); font-weight: 700; }
.stock-low { color: #e65100; font-weight: 700; }
.stock-zero { color: #c62828; font-weight: 700; }

/* Sell button */
.sell-btn { padding: 4px 12px; background: var(--accent); color: #fff; border: none; border-radius: 6px; font-size: 0.78rem; font-weight: 700; cursor: pointer; transition: opacity .15s; }
.sell-btn:hover { opacity: .8; }
.sell-btn:disabled { opacity: .35; cursor: not-allowed; }
    .select-btn { padding: 4px 12px; background: #1a73e8; color: #fff; border: none; border-radius: 6px; font-size: 0.78rem; font-weight: 700; cursor: pointer; transition: opacity .15s; margin-left: 4px; }
    .select-btn:hover { opacity: .8; }
    .select-btn:disabled { opacity: .35; cursor: not-allowed; }

/* Cart bar */
.cart-bar { position: sticky; top: 48px; z-index: 90; background: #1a73e8; color: #fff; padding: 10px 14px; border-radius: 10px; margin: 0 0 12px 0; box-shadow: 0 2px 10px rgba(0,0,0,.15); display: none; }
.cart-bar.show { display: block; }
.cart-bar-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
.cart-bar-title { font-size: 0.9rem; font-weight: 700; }
.cart-bar-actions { display: flex; gap: 8px; }
.cart-bar-btn { padding: 8px 16px; border: none; border-radius: 6px; font-size: 0.82rem; font-weight: 700; cursor: pointer; }
.cart-back-btn { background: #fff; color: #1a73e8; }
.cart-back-btn:hover { opacity: .9; }
.cart-clear-btn { background: transparent; color: #fff; border: 1px solid #fff; }
.cart-clear-btn:hover { background: rgba(255,255,255,.15); }
.cart-list { margin-top: 10px; display: grid; gap: 6px; max-height: 180px; overflow-y: auto; }
.cart-item { display: flex; align-items: center; justify-content: space-between; gap: 8px; background: rgba(255,255,255,.15); border-radius: 6px; padding: 6px 10px; font-size: 0.82rem; }
.cart-item-name { flex: 1; }
.cart-item-qty { font-weight: 700; }
.cart-item-del { background: transparent; color: #fff; border: 1px solid rgba(255,255,255,.5); border-radius: 4px; padding: 2px 8px; font-size: 0.72rem; cursor: pointer; }
.cart-item-del:hover { background: rgba(255,255,255,.2); }
.cart-total-row { display: flex; justify-content: flex-end; gap: 12px; font-weight: 700; margin-top: 6px; font-size: 0.9rem; }

/* Quantity modal */
.qty-modal { background: #fff; border-radius: 16px; padding: 24px; width: 100%; max-width: 340px; box-shadow: 0 8px 40px rgba(0,0,0,.4); color: var(--text); }
.qty-modal h3 { font-size: 1rem; margin-bottom: 6px; color: var(--text); }
.qty-item-name { font-size: 0.88rem; color: var(--sub); margin-bottom: 14px; }
.qty-controls { display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 18px; }
.qty-btn { width: 44px; height: 44px; border-radius: 50%; border: 2px solid var(--dark); background: #fff; font-size: 1.2rem; font-weight: 700; cursor: pointer; }
.qty-btn:hover { background: #f0f0f0; }
.qty-btn:disabled { opacity: .3; cursor: not-allowed; }
.qty-display { font-size: 1.8rem; font-weight: 800; min-width: 60px; text-align: center; }
.qty-price-row { text-align: center; font-size: 0.85rem; color: var(--sub); margin-bottom: 14px; }

/* Modal */
.modal-overlay { position: fixed; inset: 0; z-index: 9000; background: rgba(26,26,26,.7); display: none; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal { background: #fff; border-radius: 16px; padding: 28px 24px; width: 100%; max-width: 400px; box-shadow: 0 8px 40px rgba(0,0,0,.4); }
.modal h3 { font-size: 1rem; margin-bottom: 16px; }
.modal-field { margin-bottom: 12px; }
.modal-field label { display: block; font-size: 0.82rem; color: var(--sub); margin-bottom: 4px; font-weight: 500; }
.modal-field input, .modal-field select { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 0.92rem; outline: none; }
.modal-field input:focus, .modal-field select:focus { border-color: var(--dark); }
.modal-actions { display: flex; gap: 10px; margin-top: 18px; }
.modal-actions button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 0.92rem; font-weight: 700; cursor: pointer; }
.btn-cancel { background: #eee; color: var(--mid); }
.btn-confirm { background: var(--accent); color: #fff; }
.btn-confirm:disabled { opacity: .35; cursor: not-allowed; }
.modal-msg { margin-top: 10px; padding: 8px 12px; border-radius: 6px; font-size: 0.85rem; font-weight: 600; display: none; }
.modal-msg.ok { background: #e8f5e9; color: var(--success); display: block; }
.modal-msg.err { background: #fdeeea; color: #c62828; display: block; }

.dot-loader { display: flex; gap: 4px; }
.dot-loader span { width: 6px; height: 6px; border-radius: 50%; background: var(--sub); animation: bounce .9s infinite; }
.dot-loader span:nth-child(2) { animation-delay: .15s; }
.dot-loader span:nth-child(3) { animation-delay: .3s; }
@keyframes bounce { 0%,80%,100%{transform:scale(.6);opacity:.4} 40%{transform:scale(1);opacity:1} }

</style>
</head>

<!-- Login Overlay -->
<div id="loginOverlay" style="position:fixed;inset:0;z-index:9999;background:rgba(26,26,26,.95);display:flex;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:16px;padding:36px 32px;width:100%;max-width:340px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.4);">
    <div style="font-size:2rem;margin-bottom:8px;">🧗</div>
    <div style="font-size:1.1rem;font-weight:800;color:#1a1a1a;margin-bottom:4px;">Mono Climbing Studio</div>
    <div style="font-size:0.82rem;color:#777;margin-bottom:24px;">管理システム</div>
    <input type="password" id="loginPass" placeholder="パスワードを入力" style="width:100%;padding:12px 14px;border:1.5px solid #ddd;border-radius:8px;font-size:1rem;outline:none;margin-bottom:12px;text-align:center;" autofocus>
    <button id="loginBtn" style="width:100%;padding:13px;background:#1a1a1a;color:#fff;font-size:0.95rem;font-weight:700;border:none;border-radius:8px;cursor:pointer;">ログイン</button>
    <div id="loginErr" style="color:#c62828;font-size:0.82rem;margin-top:10px;min-height:1.2em;"></div>
  </div>
</div>
<script>
(function(){
  var PASS = 'mono';
  if (sessionStorage.getItem('mono_auth') === '1') {
    document.getElementById('loginOverlay').style.display = 'none';
    return;
  }
  document.getElementById('loginBtn').addEventListener('click', doLogin);
  document.getElementById('loginPass').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
  function doLogin(){
    var v = document.getElementById('loginPass').value;
    if (v === PASS) {
      sessionStorage.setItem('mono_auth', '1');
      document.getElementById('loginOverlay').style.display = 'none';
    } else {
      document.getElementById('loginErr').textContent = 'パスワードが正しくありません';
      document.getElementById('loginPass').value = '';
      document.getElementById('loginPass').focus();
    }
  }
})();
</script>

<script>
var allInventory = {};
var currentCategory = '';
var currentStore = '';
var CART_KEY = 'mono_shop_cart_v1';
// カート: [{ key, sheet, row, stockCol, store, storeLabel, name, price, qty, stock }]
var cart = [];
try { cart = JSON.parse(sessionStorage.getItem(CART_KEY) || '[]') || []; } catch(e) { cart = []; }

function callAPI(action, params) {
  return fetch('/api/gas', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(Object.assign({action:action}, params))
  }).then(function(r){
    return r.text().then(function(t){
      try { return JSON.parse(t); }
      catch(e) {
        return { ok:false, error:'応答JSONパース失敗', data:{ error:'サーバー応答を解釈できませんでした。時間をおいて再実行してください。', raw:(t||'').slice(0,200) } };
      }
    });
  });
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ⑫ カート内に異なる店舗在庫があると変更不可。同一店舗のみ。
function _cartLockedStore() {
  if (!cart || !cart.length) return null;
  var s = cart[0].store;
  for (var i = 1; i < cart.length; i++) {
    if (cart[i].store !== s) return null;
  }
  return s || null;
}
function _applyStoreLockUI() {
  var locked = _cartLockedStore();
  var sel = document.getElementById('storeSelect');
  if (!sel) return;
  if (locked) {
    // 在庫表示用 select は disabled にし、その店舗を強制
    sel.value = locked;
    sel.disabled = true;
    sel.title = 'カート内の物販と同一店舗を表示中（カートを空にすると変更可）';
    var msg = document.getElementById('storeLockMsg');
    if (!msg) {
      msg = document.createElement('div');
      msg.id = 'storeLockMsg';
      msg.style.cssText = 'margin-top:8px;font-size:.8rem;color:#c62828;font-weight:600;';
      sel.parentNode && sel.parentNode.appendChild(msg);
    }
    var STORE_LABELS_LOCAL = {hakata:'博多店', omura:'大村店', sasebo:'佐世保店', all:'全店舗'};
    msg.innerHTML = '🔒 ' + (STORE_LABELS_LOCAL[locked] || locked) + ' のカートが選択中のため店舗を変更できません。変更するにはカートを空にしてください。';
  } else {
    sel.disabled = false;
    sel.title = '';
    var msg2 = document.getElementById('storeLockMsg');
    if (msg2) msg2.remove();
  }
}

// Store select → background color change
document.getElementById('storeSelect').addEventListener('change', function(){
  // ⑫ カート存在時はガード
  var locked = _cartLockedStore();
  if (locked && this.value !== locked) {
    var STORE_LABELS_LOCAL = {hakata:'博多店', omura:'大村店', sasebo:'佐世保店', all:'全店舗'};
    alert('🔒 ' + (STORE_LABELS_LOCAL[locked] || locked) + ' のカートが選択中のため店舗を変更できません。\n変更するには、カートを空にしてください。');
    this.value = locked;
    return;
  }
  var store = this.value;
  document.body.className = document.body.className.replace(/store-\S+/g, '').trim();
  if (store) {
    document.body.classList.add('store-' + store);
  }
});

document.getElementById('loadBtn').addEventListener('click', loadInventory);

function loadInventory() {
  currentStore = document.getElementById('storeSelect').value;
  var wrap = document.getElementById('inventoryWrap');
  wrap.innerHTML = '<div style="display:flex;align-items:center;gap:10px;color:var(--sub);font-size:.88rem;padding:20px 0;"><div class="dot-loader"><span></span><span></span><span></span></div>在庫データを読み込み中...</div>';
  document.getElementById('catSection').style.display = 'none';
  document.getElementById('summarySection').style.display = 'none';

  // Change body class for store
  document.body.className = document.body.className.replace(/store-\S+/g, '').trim();
  document.body.classList.add('store-' + currentStore);


  if (currentStore === 'all') {
    Promise.all([
      callAPI('getInventory', {store:'hakata'}),
      callAPI('getInventory', {store:'omura'}),
      callAPI('getInventory', {store:'sasebo'})
    ]).then(function(results){
      var storeNames = ['hakata','omura','sasebo'];
      var storeLabels = {hakata:'博多',omura:'大村',sasebo:'佐世保'};
      var merged = {};
      results.forEach(function(res, si){
        if (!res.ok || !res.data) return;
        var inv = (res.data && res.data.inventory) ? res.data.inventory : res.data;
        Object.keys(inv).forEach(function(cat){
          if (!merged[cat]) merged[cat] = [];
          inv[cat].forEach(function(item){
            merged[cat].push(Object.assign({}, item, {storeName: storeNames[si], storeLabel: storeLabels[storeNames[si]]}));
          });
        });
      });
      allInventory = merged;
      var categories = Object.keys(allInventory);
      if (categories.length === 0) { wrap.innerHTML = '<div class="empty-state">在庫データがありません</div>'; return; }
      renderCategoryTabs(categories);
      currentCategory = categories[0];
      renderInventory(currentCategory);
      renderSummary();
      document.getElementById('catSection').style.display = 'block';
      document.getElementById('summarySection').style.display = 'block';
    }).catch(function(e){
      wrap.innerHTML = '<div class="empty-state" style="color:#c62828">エラー: ' + esc(e.message) + '</div>';
    });
    return;
  }
  callAPI('getInventory', {store: currentStore}).then(function(res){
    if (!res.ok || !res.data) {
      var errMsg = (res.data && res.data.error) ? res.data.error : (res.error || 'データ取得エラー');
      wrap.innerHTML = '<div class="empty-state" style="color:#c62828">エラー: ' + esc(errMsg) + '</div>';
      return;
    }
    allInventory = (res.data && res.data.inventory) ? res.data.inventory : res.data;
    var categories = Object.keys(allInventory);
    if (categories.length === 0) {
      wrap.innerHTML = '<div class="empty-state">在庫データがありません</div>';
      return;
    }
    renderCategoryTabs(categories);
    currentCategory = categories[0];
    renderInventory(currentCategory);
    renderSummary();
    document.getElementById('catSection').style.display = 'block';
    document.getElementById('summarySection').style.display = 'block';
  }).catch(function(e){
    wrap.innerHTML = '<div class="empty-state" style="color:#c62828">エラー: ' + esc(e.message) + '</div>';
  });
}

function renderCategoryTabs(categories) {
  var html = '';
  categories.forEach(function(cat, i){
    html += '<div class="cat-tab' + (i===0?' active':'') + '" data-cat="' + esc(cat) + '">' + esc(cat) + '</div>';
  });
  var container = document.getElementById('catTabs');
  container.innerHTML = html;
  container.querySelectorAll('.cat-tab').forEach(function(tab){
    tab.addEventListener('click', function(){
      container.querySelectorAll('.cat-tab').forEach(function(t){ t.classList.remove('active'); });
      this.classList.add('active');
      currentCategory = this.getAttribute('data-cat');
      renderInventory(currentCategory);
    });
  });
}

function renderInventory(category) {
  var wrap = document.getElementById('inventoryWrap');
  var items = allInventory[category];
  // ⑬ 商品名(B列)が空のためにスプレッドシート集計行が「VEGA - ¥0 在庫数」のように表示されるバグの保険フィルタ
  // 価格0かつサイズ「-」または空のものは商品マスタにない＝集計/ノイズ行とみなす
  if (items && items.length) {
    items = items.filter(function(it){
      var price = Number(it.price || 0);
      var size = String(it.size || '').trim();
      if (price === 0 && (size === '' || size === '-')) return false;
      return true;
    });
    allInventory[category] = items;
  }
  if (!items || !items.length) {
    wrap.innerHTML = '<div class="empty-state">このカテゴリーの商品がありません</div>';
    return;
  }
  var isAll = currentStore === 'all';
  var html = '<div class="table-wrap"><table><thead><tr>';
  if (isAll) html += '<th>店舗</th>';
  html += '<th>商品名</th><th>サイズ</th><th class="num-cell">価格</th>'
    + '<th class="num-cell">在庫数</th><th class="num-cell">在庫金額</th><th>操作</th>'
    + '</tr></thead><tbody>';
  items.forEach(function(item, idx){
    var stock = Number(item.stock || 0);
    var stockClass = stock === 0 ? 'stock-zero' : (stock <= 2 ? 'stock-low' : 'stock-ok');
    var stockValue = stock * Number(item.price || 0);
    html += '<tr>';
    if (isAll) html += '<td>' + esc(item.storeLabel || '') + '</td>';
    html += '<td style="font-weight:600;">' + esc(item.name) + '</td>'
      + '<td>' + esc(item.size || '-') + '</td>'
      + '<td class="num-cell">¥' + Number(item.price||0).toLocaleString() + '</td>'
      + '<td class="num-cell"><span class="' + stockClass + '">' + stock + '</span></td>'
      + '<td class="num-cell">¥' + stockValue.toLocaleString() + '</td>'
      + '<td><button class="select-btn" data-cat="' + esc(category) + '" data-idx="' + idx + '">選択</button></td>'
      + '</tr>';
  });
  html += '</tbody></table></div>';
  wrap.innerHTML = html;

      // Select button: open qty modal, then add to cart
    wrap.querySelectorAll('.select-btn').forEach(function(btn){
      btn.addEventListener('click', function(){
        var cat = this.getAttribute('data-cat');
        var idx = parseInt(this.getAttribute('data-idx'));
        var item = allInventory[cat][idx];
        if (Number(item.stock || 0) <= 0) {
          alert('在庫が 0 のため選択できません。');
          return;
        }
        openQtyModal(cat, idx, item);
      });
    });
}

// ── 個数選択モーダル ─────────────────────────────
var _qtyCtx = null;
function openQtyModal(cat, idx, item) {
  var sellStore = item.storeName || currentStore;
  var storeLabel = item.storeLabel || ({hakata:'博多',omura:'大村',sasebo:'佐世保'}[sellStore] || sellStore || '');
  var key = sellStore + '|' + cat + '|' + (item.row || 0) + '|' + item.name;
  // 既にカートにあれば残り在庫を考慮した初期値
  var existing = cart.find(function(c){ return c.key === key; });
  var alreadyQty = existing ? existing.qty : 0;
  var maxQty = Math.max(1, Number(item.stock || 0) - alreadyQty);
  if (maxQty <= 0) {
    alert('この商品はすでに在庫数まで選択済みです。');
    return;
  }
  _qtyCtx = {
    cat: cat, idx: idx, item: item,
    sellStore: sellStore, storeLabel: storeLabel,
    key: key, qty: 1, maxQty: maxQty,
    stock: Number(item.stock || 0)
  };
  document.getElementById('qtyItemName').textContent = item.name + (item.size && item.size !== '-' ? ' / ' + item.size : '') + '（在庫: ' + _qtyCtx.stock + '）';
  document.getElementById('qtyUnitPrice').textContent = Number(item.price || 0).toLocaleString();
  _updateQtyDisplay();
  document.getElementById('qtyOverlay').classList.add('show');
}
function _updateQtyDisplay() {
  if (!_qtyCtx) return;
  document.getElementById('qtyDisplay').textContent = _qtyCtx.qty;
  document.getElementById('qtyNum').textContent = _qtyCtx.qty;
  document.getElementById('qtySubtotal').textContent = (Number(_qtyCtx.item.price || 0) * _qtyCtx.qty).toLocaleString();
  document.getElementById('qtyMinus').disabled = _qtyCtx.qty <= 1;
  document.getElementById('qtyPlus').disabled = _qtyCtx.qty >= _qtyCtx.maxQty;
}
document.getElementById('qtyMinus').addEventListener('click', function(){ if (_qtyCtx && _qtyCtx.qty > 1) { _qtyCtx.qty--; _updateQtyDisplay(); }});
document.getElementById('qtyPlus').addEventListener('click', function(){ if (_qtyCtx && _qtyCtx.qty < _qtyCtx.maxQty) { _qtyCtx.qty++; _updateQtyDisplay(); }});
document.getElementById('qtyCancel').addEventListener('click', function(){ document.getElementById('qtyOverlay').classList.remove('show'); _qtyCtx = null; });
document.getElementById('qtyConfirm').addEventListener('click', function(){
  if (!_qtyCtx) return;
  var c = _qtyCtx;
  var existing = cart.find(function(x){ return x.key === c.key; });
  if (existing) {
    existing.qty += c.qty;
  } else {
    cart.push({
      key: c.key,
      sheet: c.cat,
      row: c.item.row || 0,
      stockCol: c.item.stockCol || 0,
      store: c.sellStore,
      storeLabel: c.storeLabel,
      name: c.item.name,
      size: c.item.size || '',
      price: Number(c.item.price || 0),
      qty: c.qty
    });
  }
  saveCart();
  renderCart();
  document.getElementById('qtyOverlay').classList.remove('show');
  _qtyCtx = null;
});

// ── カート管理 ──────────────────────────────────
function saveCart() {
  try { sessionStorage.setItem(CART_KEY, JSON.stringify(cart)); } catch(e){}
}
function renderCart() {
  var bar = document.getElementById('cartBar');
  var list = document.getElementById('cartList');
  if (!cart.length) {
    bar.classList.remove('show');
    list.innerHTML = '';
    return;
  }
  bar.classList.add('show');
  var totalQty = 0, totalAmt = 0;
  var html = '';
  cart.forEach(function(c, i){
    totalQty += c.qty;
    totalAmt += c.price * c.qty;
    var storeTag = c.storeLabel ? '[' + esc(c.storeLabel) + '] ' : '';
    html += '<div class="cart-item">'
      + '<span class="cart-item-name">' + storeTag + esc(c.name) + (c.size ? ' / ' + esc(c.size) : '') + '</span>'
      + '<span class="cart-item-qty">× ' + c.qty + '</span>'
      + '<span>¥' + (c.price * c.qty).toLocaleString() + '</span>'
      + '<button class="cart-item-del" data-i="' + i + '">削除</button>'
      + '</div>';
  });
  list.innerHTML = html;
  document.getElementById('cartCount').textContent = totalQty;
  document.getElementById('cartTotal').textContent = totalAmt.toLocaleString();
  list.querySelectorAll('.cart-item-del').forEach(function(btn){
    btn.addEventListener('click', function(){
      var i = parseInt(this.getAttribute('data-i'));
      cart.splice(i, 1);
      saveCart();
      renderCart();
    });
  });
  // ⑫ カート状態に応じて店舗 select を ロック/解除
  try { _applyStoreLockUI(); } catch(e){}
}
document.getElementById('cartClearBtn').addEventListener('click', function(){
  if (!cart.length) return;
  if (!confirm('カートを空にしますか？')) return;
  cart = [];
  saveCart();
  renderCart();
});
document.getElementById('cartBackBtn').addEventListener('click', function(){
  if (!cart.length) return;
  // 入店登録画面に戻る → cart=1 でフラグ付与、index.html側で sessionStorage から読む
  window.location.href = 'index.html?cart=1';
});

// 初期表示
renderCart();

function renderSummary() {
  var totalItems = 0, totalStock = 0, totalValue = 0, outOfStock = 0;
  Object.keys(allInventory).forEach(function(cat){
    allInventory[cat].forEach(function(item){
      totalItems++;
      var s = Number(item.stock || 0);
      totalStock += s;
      totalValue += s * Number(item.price || 0);
      if (s <= 0) outOfStock++;
    });
  });
  document.getElementById('sItemCount').textContent = totalItems;
  document.getElementById('sStockCount').textContent = totalStock.toLocaleString();
  document.getElementById('sStockValue').textContent = totalValue.toLocaleString();
  document.getElementById('sOutOfStock').textContent = outOfStock;
}


</script>
