<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>入店登録 - Mono Climbing Studio</title>
<style>
:root {
  --accent: #e84c2c;
  --dark: #1a1a1a;
  --mid: #444;
  --light-bg: #f7f7f7;
  --card-bg: #ffffff;
  --border: #e0e0e0;
  --text: #222;
  --sub: #777;
  --success: #2e7d32;
  --radius: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--light-bg); color: var(--text); }

/* ── Nav ── */
nav { background: var(--dark); display: flex; align-items: center; padding: 0 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.3); }
nav .logo { color: #fff; font-size: 0.8rem; font-weight: 700; letter-spacing: .05em; padding: 12px 12px 12px 0; margin-right: 8px; border-right: 1px solid #444; white-space: nowrap; }
nav a { color: #aaa; text-decoration: none; padding: 14px 14px; font-size: 0.85rem; border-bottom: 3px solid transparent; transition: all .15s; white-space: nowrap; }
nav a.active { color: #fff; border-bottom-color: var(--accent); }
nav a:hover { color: #fff; }

/* ── Layout ── */
.page { max-width: 680px; margin: 0 auto; padding: 16px 14px 60px; }

/* ── Section ── */
.section { margin-bottom: 14px; }
.section-head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.step-num { width: 26px; height: 26px; border-radius: 50%; background: var(--dark); color: #fff; font-size: 0.78rem; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.section-title { font-size: 0.95rem; font-weight: 700; color: var(--text); }
.card { background: var(--card-bg); border-radius: var(--radius); padding: 14px 16px; box-shadow: 0 1px 4px rgba(0,0,0,.07); }

/* ── Store selector ── */
.store-tabs { display: flex; gap: 8px; }
.store-tab { flex: 1; padding: 11px 8px; border: 2px solid var(--border); border-radius: 8px; background: #fff; cursor: pointer; font-size: 0.88rem; font-weight: 600; text-align: center; transition: all .15s; color: var(--mid); }
.store-tab.sel { background: var(--dark); color: #fff; border-color: var(--dark); }
.store-tab:hover:not(.sel) { border-color: #aaa; }

/* ── Member ── */
.input-row { display: flex; gap: 8px; align-items: stretch; }
.input-row input { flex: 1; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 0.92rem; outline: none; transition: border .15s; }
.input-row input:focus { border-color: var(--dark); }
.icon-btn { padding: 0 16px; border: 1.5px solid var(--border); border-radius: 8px; background: #fff; cursor: pointer; font-size: 0.88rem; white-space: nowrap; transition: all .15s; }
.icon-btn:hover { border-color: var(--dark); background: var(--dark); color: #fff; }
.member-badge { margin-top: 8px; padding: 8px 12px; border-radius: 8px; font-size: 0.88rem; font-weight: 600; display: none; }
.member-badge.found { background: #e8f5e9; color: var(--success); display: block; }
.member-badge.notfound { background: #f5f5f5; color: var(--sub); display: block; }
.guest-row { margin-top: 10px; }
.field-label { font-size: 0.79rem; color: var(--sub); margin-bottom: 5px; font-weight: 500; }
.full-input { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 0.92rem; outline: none; transition: border .15s; }
.full-input:focus { border-color: var(--dark); }

/* ── Plan step labels ── */
.plan-step-label {
  display: flex; align-items: center; gap: 8px;
  font-size: 0.78rem; font-weight: 700; color: var(--sub);
  text-transform: uppercase; letter-spacing: .05em;
  margin-bottom: 8px;
}
.plan-step-label .step-badge {
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--dark); color: #fff;
  font-size: 0.7rem; font-weight: 800;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

/* ── Plan/Attr Select ── */
.plan-select {
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-size: 0.92rem;
  font-weight: 600;
  background: #fff;
  color: var(--text);
  cursor: pointer;
  outline: none;
  appearance: auto;
  transition: border .15s;
}
.plan-select:focus { border-color: var(--dark); }
.plan-select.has-val { border-color: var(--dark); background: #f8f8f8; }
.plan-select option { font-weight: 500; }

/* ── Plan: Step B ── */
.sub-plan-area {
  margin-top: 14px; padding-top: 14px;
  border-top: 1px dashed var(--border); display: none;
}

/* ── Plan summary chip ── */
.plan-summary {
  margin-top: 8px; padding: 8px 12px;
  background: #f0f4ff; border: 1.5px solid #b3c3f3;
  border-radius: 8px; font-size: 0.88rem; font-weight: 600;
  color: #1a237e; display: none;
}

/* ── Rental ── */
.rental-section { display: flex; flex-direction: column; gap: 12px; }

/* Mat dropdown row */
.rental-mat-row {
  background: #f9f9f9;
  border: 1.5px solid var(--border); border-radius: 8px;
  padding: 12px 14px;
}
.rental-mat-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.rental-mat-name { font-size: 0.9rem; font-weight: 700; color: var(--text); }
.rental-mat-hint { font-size: 0.76rem; color: var(--sub); }
.mat-select {
  width: 100%;
  padding: 10px 14px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-size: 0.9rem;
  font-weight: 600;
  background: #fff;
  cursor: pointer;
  outline: none;
  appearance: auto;
  transition: border .15s;
}
.mat-select:focus { border-color: var(--dark); }
.mat-select.has-val { border-color: #1a5276; color: #1a5276; background: #eaf0f6; }

/* Other rental chips */
.rental-other-label { font-size: 0.78rem; color: var(--sub); font-weight: 600; letter-spacing:.04em; margin-bottom: 4px; }
.chip-group { display: flex; flex-wrap: wrap; gap: 8px; }
.rental-chip { padding: 9px 14px; border: 2px solid var(--border); border-radius: 8px; cursor: pointer; background: #fff; font-size: 0.85rem; transition: all .15s; font-weight: 600; }
.rental-chip:hover:not(.sel) { border-color: #999; }
.rental-chip.sel { background: #1a5276; color: #fff; border-color: #1a5276; }

/* ── Payment ── */
.pay-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.pay-chip { padding: 11px 8px; border: 2px solid var(--border); border-radius: 8px; cursor: pointer; background: #fff; font-size: 0.83rem; font-weight: 600; text-align: center; transition: all .15s; }
.pay-chip:hover:not(.sel) { border-color: #999; }
.pay-chip.sel { background: var(--dark); color: #fff; border-color: var(--dark); }

/* ── Summary ── */
.total-display { font-size: 2rem; font-weight: 800; color: var(--text); letter-spacing: -.02em; }
.total-display span { font-size: 1.1rem; font-weight: 600; }
.total-breakdown { margin-top: 6px; font-size: 0.82rem; color: var(--sub); min-height: 18px; }
.register-btn { margin-top: 14px; width: 100%; padding: 15px; background: var(--accent); color: #fff; font-size: 1rem; font-weight: 700; border: none; border-radius: var(--radius); cursor: pointer; transition: opacity .15s; position: relative; }
.register-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.register-btn:not(:disabled):hover { opacity: 0.88; }
.register-btn .spinner { display: none; width: 18px; height: 18px; border: 2.5px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; position: absolute; right: 16px; top: 50%; transform: translateY(-50%); }
.register-btn.loading .spinner { display: block; }
.register-btn.loading { pointer-events: none; }
@keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }

#msg { margin-top: 10px; padding: 10px 14px; border-radius: 8px; font-size: 0.9rem; font-weight: 600; display: none; }
#msg.ok { background: #e8f5e9; color: var(--success); display: block; }
#msg.err { background: #fdecea; color: #c62828; display: block; }
.loading-row { color: var(--sub); font-size: 0.85rem; display: flex; align-items: center; gap: 8px; }
.dot-loader { display: flex; gap: 4px; }
.dot-loader span { width: 6px; height: 6px; border-radius: 50%; background: var(--sub); animation: bounce .9s infinite; }
.dot-loader span:nth-child(2) { animation-delay: .15s; }
.dot-loader span:nth-child(3) { animation-delay: .3s; }
@keyframes bounce { 0%,80%,100%{transform:scale(.6);opacity:.4} 40%{transform:scale(1);opacity:1} }

/* ── Merch & Discount ── */
.yen-prefix { font-size: 1rem; font-weight: 700; color: var(--sub); align-self: center; }
.merch-input-row { display: flex; align-items: center; gap: 6px; }
.discount-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
.discount-row > div { flex: 1; min-width: 130px; }
#discountPreview { margin-top: 8px; font-size: 0.85rem; color: #1a5276; font-weight: 600; min-height: 18px; }

/* ── Login Overlay ── */
#loginOverlay {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--dark);
  display: flex; align-items: center; justify-content: center;
}
#loginOverlay.hidden { display: none; }
.login-box {
  background: #fff; border-radius: 14px;
  padding: 36px 32px; width: 100%; max-width: 360px;
  box-shadow: 0 8px 40px rgba(0,0,0,.4);
  text-align: center;
}
.login-logo { font-size: 1.5rem; font-weight: 800; color: var(--dark); margin-bottom: 4px; letter-spacing: .03em; }
.login-sub { font-size: 0.82rem; color: var(--sub); margin-bottom: 28px; }
.login-label { font-size: 0.8rem; color: var(--sub); font-weight: 600; text-align: left; margin-bottom: 6px; }
.login-input {
  width: 100%; padding: 12px 14px;
  border: 1.5px solid var(--border); border-radius: 8px;
  font-size: 1rem; outline: none; transition: border .15s;
  margin-bottom: 14px;
}
.login-input:focus { border-color: var(--dark); }
.login-btn {
  width: 100%; padding: 13px;
  background: var(--accent); color: #fff;
  border: none; border-radius: 8px;
  font-size: 1rem; font-weight: 700; cursor: pointer;
  transition: opacity .15s;
}
.login-btn:hover { opacity: 0.88; }
.login-err { margin-top: 10px; font-size: 0.85rem; color: #c62828; font-weight: 600; min-height: 20px; }
</style>
</head>
<body>

<!-- ── ログイン画面 ── -->
<div id="loginOverlay">
  <div class="login-box">
    <div class="login-logo">🧗 MONO</div>
    <div class="login-sub">Mono Climbing Studio — スタッフログイン</div>
    <div class="login-label">パスワード</div>
    <input type="password" id="loginPass" class="login-input" placeholder="スタッフパスワードを入力" autocomplete="current-password">
    <button class="login-btn" id="loginBtn">ログイン</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<nav>
  <div class="logo">🧗 MONO</div>
  <a href="index.html" class="active">入店登録</a>
  <a href="members.html">会員管理</a>
  <a href="sales.html">売上管理</a>
</nav>

<div class="page">

  <!-- 店舗 -->
  <div class="section">
    <div class="section-head">
      <div class="step-num">店</div>
      <div class="section-title">店舗を選択</div>
    </div>
    <div class="card">
      <div class="store-tabs">
        <button class="store-tab sel" data-store="hakata">博多店</button>
        <button class="store-tab" data-store="omura">大村店</button>
        <button class="store-tab" data-store="sasebo">佐世保店</button>
        <button class="store-tab" data-store="test" style="border-color:#ccc;color:#999;font-size:0.78rem;">テスト</button>
      </div>
    </div>
  </div>

  <!-- 会員番号 -->
  <div class="section">
    <div class="section-head">
      <div class="step-num">①</div>
      <div class="section-title">会員番号</div>
    </div>
    <div class="card">
      <div class="input-row">
        <input type="text" id="memberCode" placeholder="例: 1234" inputmode="numeric" style="max-width:160px;">
        <button class="icon-btn" id="searchBtn">検索</button>
        <span id="memberNameInline" style="font-size:.9rem;font-weight:600;align-self:center;"></span>
      </div>
      <div id="memberBadge" class="member-badge"></div>
      <div class="guest-row">
        <div class="field-label">ゲスト氏名（会員でない場合）</div>
        <input type="text" id="guestName" class="full-input" placeholder="氏名を入力">
      </div>
    </div>
  </div>

  <!-- 利用プラン -->
  <div class="section">
    <div class="section-head">
      <div class="step-num">②</div>
      <div class="section-title">利用プラン</div>
    </div>
    <div class="card">

      <!-- STEP A: お客様の属性（区分②） -->
      <div class="plan-step-label">
        <div class="step-badge">A</div>
        お客様の属性を選択
      </div>
      <div id="attrWrap">
        <div class="loading-row"><div class="dot-loader"><span></span><span></span><span></span></div>読み込み中...</div>
      </div>

      <!-- STEP B: 利用の種類（区分①） -->
      <div id="planSubWrap" class="sub-plan-area">
        <div class="plan-step-label">
          <div class="step-badge">B</div>
          利用の種類を選択
        </div>
        <div id="planWrap"></div>
        <div id="planSummary" class="plan-summary"></div>
      </div>

    </div>
  </div>

  <!-- レンタル -->
  <div class="section">
    <div class="section-head">
      <div class="step-num">③</div>
      <div class="section-title">レンタル <span style="font-size:.78rem;font-weight:400;color:var(--sub);">複数選択可</span></div>
    </div>
    <div class="card">
      <div id="rentalSection" class="rental-section">
        <div class="loading-row"><div class="dot-loader"><span></span><span></span><span></span></div>読み込み中...</div>
      </div>
    </div>
  </div>

  <!-- 商品購入 -->
  <div class="section">
    <div class="section-head">
      <div class="step-num">④</div>
      <div class="section-title">商品購入 <span style="font-size:.78rem;font-weight:400;color:var(--sub);">任意</span></div>
    </div>
    <div class="card">
      <div class="field-label">購入金額</div>
      <div class="merch-input-row">
        <span class="yen-prefix">¥</span>
        <input type="number" id="merchAmt" class="full-input" placeholder="0" min="0" style="max-width:160px;">
      </div>
      <div class="field-label" style="margin-top:10px;">商品メモ（任意）</div>
      <input type="text" id="merchNote" class="full-input" placeholder="商品名など">
      <!-- 割引（商品購入内） -->
      <div style="margin-top:14px; padding-top:14px; border-top:1px dashed var(--border);">
        <div class="field-label" style="margin-bottom:8px; font-weight:700;">割引 <span style="font-size:.78rem;font-weight:400;color:var(--sub);">任意</span></div>
        <div class="discount-row">
          <div>
            <div class="field-label">割引率</div>
            <select id="discountRate" class="plan-select">
              <option value="">なし</option>
              <option value="10">10% OFF</option>
              <option value="20">20% OFF</option>
              <option value="30">30% OFF</option>
            </select>
          </div>
          <div>
            <div class="field-label">割引額（手入力可）</div>
            <div class="merch-input-row">
              <span class="yen-prefix">−¥</span>
              <input type="number" id="discountAmt" class="full-input" placeholder="0" min="0" style="max-width:120px;">
            </div>
          </div>
        </div>
        <div id="discountPreview"></div>
      </div>
    </div>
  </div>

  <!-- 調整金額 -->
  <div class="section">
    <div class="section-head">
      <div class="step-num">⑤</div>
      <div class="section-title">調整金額 <span style="font-size:.78rem;font-weight:400;color:var(--sub);">任意</span></div>
    </div>
    <div class="card">
      <div class="field-label">調整額（＋追加請求 / −値引き）</div>
      <div class="merch-input-row">
        <input type="number" id="adjustAmt" class="full-input" placeholder="例: -500 または 300" style="max-width:220px;">
        <span style="font-size:0.85rem;color:var(--sub);align-self:center;">円</span>
      </div>
      <div class="field-label" style="margin-top:10px;">調整メモ（任意）</div>
      <input type="text" id="adjustNote" class="full-input" placeholder="値引き理由・追加費用など">
      <div id="adjustPreview" style="margin-top:8px; font-size:0.85rem; font-weight:600; min-height:18px;"></div>
    </div>
  </div>

  <!-- 支払い -->
  <div class="section">
    <div class="section-head">
      <div class="step-num">⑥</div>
      <div class="section-title">支払い方法</div>
    </div>
    <div class="card">
      <div class="pay-grid">
        <button class="pay-chip" data-method="現金">💴 現金</button>
        <button class="pay-chip" data-method="クレジット">💳 クレジット</button>
        <button class="pay-chip" data-method="電子マネー">📱 電子マネー</button>
        <button class="pay-chip" data-method="QRコード">📲 QRコード</button>
        <button class="pay-chip" data-method="交通系IC">🚃 交通系IC</button>
      </div>
    </div>
  </div>

  <!-- 合計・登録 -->
  <div class="section">
    <div class="section-head">
      <div class="step-num" style="background:var(--accent);">✓</div>
      <div class="section-title">確認・登録</div>
    </div>
    <div class="card">
      <div class="total-display"><span>¥</span><span id="totalNum">0</span></div>
      <div class="total-breakdown" id="totalBreakdown"></div>
      <button class="register-btn" id="registerBtn" disabled>
        入店登録する
        <div class="spinner"></div>
      </button>
      <div id="msg"></div>
    </div>
  </div>

</div><!-- /page -->

<script>
var allPlans = [], planSel = null, rentalSel = [], paymentSel = null;
var matOptions = [], matSel = null;
var CACHE_TTL = 30 * 60 * 1000; // 30min

function callAPI(action, params) {
  return fetch('/api/gas', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(Object.assign({action: action}, params))
  }).then(function(r){ return r.json(); });
}

function getCached(key) {
  try {
    var s = sessionStorage.getItem(key);
    if (!s) return null;
    var d = JSON.parse(s);
    if (Date.now() - d.ts > CACHE_TTL) { sessionStorage.removeItem(key); return null; }
    return d.data;
  } catch(e) { return null; }
}
function setCache(key, data) {
  try { sessionStorage.setItem(key, JSON.stringify({ts: Date.now(), data: data})); } catch(e){}
}

// Store selection
document.querySelectorAll('.store-tab').forEach(function(btn){
  btn.addEventListener('click', function(){
    document.querySelectorAll('.store-tab').forEach(function(b){ b.classList.remove('sel'); });
    btn.classList.add('sel');
  });
});
function getStore() {
  var sel = document.querySelector('.store-tab.sel');
  return sel ? sel.dataset.store : 'hakata';
}

// ── Init ──────────────────────────────────────────
function init() {
  var cachedPlans = getCached('plans');
  if (cachedPlans) {
    allPlans = cachedPlans;
    buildAttrDropdown();
  } else {
    callAPI('getPriceList', {}).then(function(pr){
      allPlans = pr.data || [];
      setCache('plans', allPlans);
      buildAttrDropdown();
    }).catch(function(){
      document.getElementById('attrWrap').innerHTML = '<span style="color:red;font-size:.85rem">読み込みエラー</span>';
    });
  }

  var rs = document.getElementById('rentalSection');
  var cachedRentals = getCached('rentals');
  if (cachedRentals) {
    buildRentalSection(cachedRentals, rs);
  } else {
    callAPI('getRentalList', {}).then(function(rr){
      var rentals = rr.data || [];
      setCache('rentals', rentals);
      buildRentalSection(rentals, rs);
    }).catch(function(){
      rs.innerHTML = '<span style="color:red;font-size:.85rem">読み込みエラー</span>';
    });
  }
}

// ── GASデータ構造:
//   plan1 = 利用の種類コード（例: "2h", "2h小", "1day小", "トライアル"）
//   plan2 = 属性（例: "学生", "大人", "未就学児", "シニア"）
//   小学生エントリ: plan1 の末尾が "小"（例: "2h小", "1day小"）、plan2="学生"
// ────────────────────────────────────────────────

// plan1が"小"で終わる → 小学生エントリ
function isKoEntry(p) {
  return p.plan1 && p.plan1.slice(-1) === '小';
}

// エントリの属性を返す（小学生は"小学生"、それ以外はplan2）
function getAttrOfEntry(p) {
  if (isKoEntry(p)) return '小学生';
  return p.plan2 || '';
}

// Step B に表示する利用の種類ラベル（小学生エントリは末尾の"小"を除去）
function getUsageLabel(p) {
  var t = p.plan1 || p.label;
  if (isKoEntry(p)) t = t.slice(0, -1);
  return t || p.label;
}

// ── STEP A: 属性ドロップダウン ──────────────────────
function buildAttrDropdown() {
  var wrap = document.getElementById('attrWrap');
  wrap.innerHTML = '';

  // plan2（属性）の一覧を収集 + 小学生（plan1末尾"小"）を追加
  var attrs = [];
  allPlans.forEach(function(p){
    var attr = getAttrOfEntry(p);
    if (attr && attrs.indexOf(attr) < 0) attrs.push(attr);
  });

  // 表示順固定: 未就学児→小学生→学生→大人→シニア→パス・回数券
  var ORDER = ['未就学児','小学生','学生','大人','シニア','月パス利用','昼月パス利用','回数券利用'];
  attrs.sort(function(a, b) {
    var ai = ORDER.indexOf(a), bi = ORDER.indexOf(b);
    if (ai < 0) ai = 999; if (bi < 0) bi = 999;
    return ai - bi;
  });

  if (!attrs.length) {
    wrap.innerHTML = '<span style="color:var(--sub);font-size:.85rem">プランがありません</span>';
    return;
  }

  var sel = document.createElement('select');
  sel.id = 'attrSelect';
  sel.className = 'plan-select';
  var opts = '<option value="">-- 属性を選択してください --</option>';
  attrs.forEach(function(attr){
    opts += '<option value="' + escAttr(attr) + '">' + esc(attr) + '</option>';
  });
  sel.innerHTML = opts;
  wrap.appendChild(sel);

  sel.addEventListener('change', function(){
    var cat = this.value;
    planSel = null;
    this.className = 'plan-select' + (cat ? ' has-val' : '');
    updateTotal();
    var subWrap = document.getElementById('planSubWrap');
    if (cat) {
      buildPlanDropdown(cat);
      subWrap.style.display = 'block';
    } else {
      subWrap.style.display = 'none';
      document.getElementById('planSummary').style.display = 'none';
    }
  });
}

// ── STEP B: 利用の種類ドロップダウン ────────────────
function buildPlanDropdown(attrName) {
  var wrap = document.getElementById('planWrap');
  wrap.innerHTML = '';
  var summaryEl = document.getElementById('planSummary');
  summaryEl.style.display = 'none';
  planSel = null;

  // 選択した属性に対応するプランを絞り込む
  var filtered = allPlans.filter(function(p){
    return getAttrOfEntry(p) === attrName;
  });
  if (!filtered.length) return;

  // プランが1つだけなら自動確定
  if (filtered.length === 1) {
    var p = filtered[0];
    planSel = {plan1: p.plan1, plan2: p.plan2, label: p.label, amount: Number(p.amount)};
    summaryEl.textContent = '✓  ' + esc(p.label) + '　¥' + Number(p.amount).toLocaleString();
    summaryEl.style.display = 'block';
    updateTotal();
    return;
  }

  var sel = document.createElement('select');
  sel.id = 'planSelect';
  sel.className = 'plan-select';
  // 金額非表示、利用の種類ラベルのみ表示
  var opts = '<option value="">-- 利用の種類を選択してください --</option>';
  filtered.forEach(function(p, i){
    opts += '<option value="' + i + '">' + esc(getUsageLabel(p)) + '</option>';
  });
  sel.innerHTML = opts;
  wrap.appendChild(sel);

  sel.addEventListener('change', function(){
    var idx = parseInt(this.value);
    if (this.value === '' || isNaN(idx)) {
      planSel = null;
      this.className = 'plan-select';
      summaryEl.style.display = 'none';
    } else {
      var p = filtered[idx];
      planSel = {plan1: p.plan1, plan2: p.plan2, label: p.label, amount: Number(p.amount)};
      this.className = 'plan-select has-val';
      summaryEl.textContent = '✓  ' + esc(p.label) + '　¥' + Number(p.amount).toLocaleString();
      summaryEl.style.display = 'block';
    }
    updateTotal();
  });
}

// ── レンタルセクション ──────────────────────────────
function buildRentalSection(rentals, rs) {
  rs.innerHTML = '';
  matOptions = [];
  matSel = null;

  if (!rentals.length) {
    rs.innerHTML = '<span style="color:var(--sub);font-size:.85rem">なし</span>';
    return;
  }

  // マット系とその他に分類
  var matItems = rentals.filter(function(r){ return r.name && r.name.indexOf('マット') >= 0; });
  var otherRentals = rentals.filter(function(r){ return !r.name || r.name.indexOf('マット') < 0; });
  matOptions = matItems;

  // ── マット: ドロップダウン（全オプションを個別表示）──
  if (matItems.length) {
    var matRow = document.createElement('div');
    matRow.className = 'rental-mat-row';

    var headerDiv = document.createElement('div');
    headerDiv.className = 'rental-mat-header';
    headerDiv.innerHTML =
      '<div class="rental-mat-name">🧘 クライミングマット</div>' +
      '<div class="rental-mat-hint">種類・泊数を選択</div>';
    matRow.appendChild(headerDiv);

    var opts = '<option value="-1">なし</option>';
    matItems.forEach(function(r, i){
      opts += '<option value="' + i + '">' + esc(r.name) + '　¥' + Number(r.amount).toLocaleString() + '</option>';
    });

    var matSel_el = document.createElement('select');
    matSel_el.id = 'matSelect';
    matSel_el.className = 'mat-select';
    matSel_el.innerHTML = opts;
    matRow.appendChild(matSel_el);
    rs.appendChild(matRow);

    matSel_el.addEventListener('change', function(){
      var idx = parseInt(this.value);
      matSel = (idx >= 0) ? matOptions[idx] : null;
      this.className = 'mat-select' + (idx >= 0 ? ' has-val' : '');
      updateTotal();
    });
  }

  // ── その他レンタル: チップボタン ──
  if (otherRentals.length) {
    if (matItems.length) {
      var otherLabel = document.createElement('div');
      otherLabel.className = 'rental-other-label';
      otherLabel.textContent = 'その他のレンタル';
      rs.appendChild(otherLabel);
    }
    var chipWrap = document.createElement('div');
    chipWrap.className = 'chip-group';
    otherRentals.forEach(function(r){
      var btn = document.createElement('button');
      btn.className = 'rental-chip';
      btn.textContent = r.name + '　¥' + Number(r.amount).toLocaleString();
      btn.addEventListener('click', function(){
        var idx = rentalSel.findIndex(function(x){ return x.name === r.name; });
        if (idx >= 0) { rentalSel.splice(idx, 1); btn.classList.remove('sel'); }
        else { rentalSel.push({name: r.name, amount: Number(r.amount)}); btn.classList.add('sel'); }
        updateTotal();
      });
      chipWrap.appendChild(btn);
    });
    rs.appendChild(chipWrap);
  }

  if (!matItems.length && !otherRentals.length) {
    rs.innerHTML = '<span style="color:var(--sub);font-size:.85rem">なし</span>';
  }
}

// Payment
document.querySelectorAll('.pay-chip').forEach(function(btn){
  btn.addEventListener('click', function(){
    document.querySelectorAll('.pay-chip').forEach(function(b){ b.classList.remove('sel'); });
    btn.classList.add('sel');
    paymentSel = btn.dataset.method;
    updateRegisterBtn();
  });
});

function updateTotal() {
  var t = planSel ? planSel.amount : 0;
  var rentalTotal = 0;
  if (matSel) rentalTotal += Number(matSel.amount);
  rentalSel.forEach(function(r){ rentalTotal += r.amount; });
  t += rentalTotal;
  var merch = parseInt(document.getElementById('merchAmt').value) || 0;
  var discount = parseInt(document.getElementById('discountAmt').value) || 0;
  var netMerch = Math.max(0, merch - discount);
  t += netMerch;
  var adjust = parseInt(document.getElementById('adjustAmt').value) || 0;
  t += adjust;
  if (t < 0) t = 0;
  document.getElementById('totalNum').textContent = t.toLocaleString();
  var bd = '';
  if (planSel) bd += 'プラン: ¥' + planSel.amount.toLocaleString();
  if (rentalTotal > 0) bd += (bd ? '　＋　' : '') + 'レンタル: ¥' + rentalTotal.toLocaleString();
  if (merch > 0) {
    if (discount > 0) {
      bd += (bd ? '　＋　' : '') + '商品: ¥' + netMerch.toLocaleString() + '（割引−¥' + discount.toLocaleString() + '）';
    } else {
      bd += (bd ? '　＋　' : '') + '商品: ¥' + merch.toLocaleString();
    }
  }
  if (adjust > 0) bd += (bd ? '　＋　' : '') + '調整: ¥' + adjust.toLocaleString();
  if (adjust < 0) bd += (bd ? '　−　' : '') + '調整: −¥' + Math.abs(adjust).toLocaleString();
  document.getElementById('totalBreakdown').textContent = bd;
  updateRegisterBtn();
}

function updateRegisterBtn() {
  var isZeroYen = planSel && Number(planSel.amount) === 0;
  document.getElementById('registerBtn').disabled = !(planSel && (paymentSel || isZeroYen));
}

// Member search
document.getElementById('searchBtn').addEventListener('click', function(){
  var code = document.getElementById('memberCode').value.trim();
  if (!code) { alert('会員番号を入力してください'); return; }
  var badge = document.getElementById('memberBadge');
  badge.className = 'member-badge notfound';
  badge.textContent = '検索中...';
  badge.style.display = 'block';
  callAPI('getMember', {code: code, store: getStore()}).then(function(res){
    var m = res.data;
    if (m && m.name) {
      badge.className = 'member-badge found';
      badge.textContent = '✓  ' + m.name + '　（会員番号: ' + code + '）';
      document.getElementById('guestName').value = '';
    } else {
      badge.className = 'member-badge notfound';
      badge.textContent = '会員番号 ' + code + ' は未登録です';
    }
  }).catch(function(){ badge.textContent = 'エラーが発生しました'; });
});
document.getElementById('memberCode').addEventListener('keydown', function(e){
  if (e.key === 'Enter') document.getElementById('searchBtn').click();
});

// Register
document.getElementById('registerBtn').addEventListener('click', function(){
  if (!planSel) return;
  // 0円プランは支払い方法不要（プラン名を支払いラベルに使用）
  var effectivePayment = paymentSel || (Number(planSel.amount) === 0 ? planSel.plan1 : null);
  if (!effectivePayment) return;
  var badge = document.getElementById('memberBadge');
  var badgeName = (badge.className.indexOf('found') >= 0) ? badge.textContent.replace('✓  ','').split('　（')[0].trim() : '';
  var memberName = badgeName || document.getElementById('guestName').value.trim() || 'ゲスト';
  var rentalFee = 0, rentalNames = [];
  if (matSel) {
    rentalFee += Number(matSel.amount);
    rentalNames.push(matSel.name);
  }
  rentalSel.forEach(function(r){ rentalFee += r.amount; rentalNames.push(r.name); });
  var merch = parseInt(document.getElementById('merchAmt').value) || 0;
  var discount = parseInt(document.getElementById('discountAmt').value) || 0;
  var adjust = parseInt(document.getElementById('adjustAmt').value) || 0;
  var netMerch = Math.max(0, merch - discount);
  var total = planSel.amount + rentalFee + netMerch + adjust;
  if (total < 0) total = 0;
  var params = {
    store: getStore(),
    memberCode: document.getElementById('memberCode').value.trim(),
    memberName: memberName,
    regFee: 0, plan1: planSel.plan1, plan2: planSel.plan2,
    planLabel: planSel.label, usageFee: planSel.amount,
    merchAmt: netMerch, merchNote: document.getElementById('merchNote').value.trim(),
    rentalNote: rentalNames.join(','), rentalFee: rentalFee,
    adjustment: adjust, adjustNote: document.getElementById('adjustNote').value.trim(),
    total: total, payment: effectivePayment,
    cash: effectivePayment === '現金' ? total : 0,
    credit: effectivePayment === 'クレジット' ? total : 0,
    emoney: effectivePayment === '電子マネー' ? total : 0,
    qr: effectivePayment === 'QRコード' ? total : 0,
    transit: effectivePayment === '交通系IC' ? total : 0,
    notes: ''
  };
  var btn = document.getElementById('registerBtn');
  var msg = document.getElementById('msg');
  btn.classList.add('loading');
  msg.className = '';
  msg.style.display = 'none';
  callAPI('registerEntry', {params: params}).then(function(res){
    btn.classList.remove('loading');
    if (res.ok && res.data && res.data.success) {
      msg.className = 'ok';
      msg.textContent = '✓ 入店登録しました！ ' + (res.data.entryTime || '');
      setTimeout(function(){ location.reload(); }, 2200);
    } else {
      msg.className = 'err';
      msg.textContent = 'エラー: ' + (res.data ? res.data.error : res.error || '不明');
    }
  }).catch(function(e){
    btn.classList.remove('loading');
    msg.className = 'err';
    msg.textContent = 'エラー: ' + e.message;
  });
});

// Merch & Discount listeners
function updateDiscountPreview() {
  var merch = parseInt(document.getElementById('merchAmt').value) || 0;
  var rate = parseInt(document.getElementById('discountRate').value) || 0;
  var discount = parseInt(document.getElementById('discountAmt').value) || 0;
  var preview = document.getElementById('discountPreview');
  if (merch > 0 && discount > 0) {
    var net = Math.max(0, merch - discount);
    preview.textContent = '商品割引後: ¥' + net.toLocaleString() + '（−¥' + discount.toLocaleString() + (rate ? '　' + rate + '% OFF' : '') + '）';
    preview.style.color = '#1a5276';
  } else {
    preview.textContent = '';
  }
}
document.getElementById('merchAmt').addEventListener('input', function(){
  // 割引率が設定されていれば割引額を再計算
  var rate = parseInt(document.getElementById('discountRate').value) || 0;
  if (rate > 0) {
    var merch = parseInt(this.value) || 0;
    var d = Math.floor(merch * rate / 100);
    document.getElementById('discountAmt').value = d > 0 ? d : '';
  }
  updateDiscountPreview();
  updateTotal();
});
document.getElementById('discountRate').addEventListener('change', function(){
  var rate = parseInt(this.value) || 0;
  var merch = parseInt(document.getElementById('merchAmt').value) || 0;
  if (rate > 0) {
    var d = Math.floor(merch * rate / 100);
    document.getElementById('discountAmt').value = d > 0 ? d : '';
  } else {
    document.getElementById('discountAmt').value = '';
  }
  updateDiscountPreview();
  updateTotal();
});
document.getElementById('discountAmt').addEventListener('input', function(){
  document.getElementById('discountRate').value = '';
  updateDiscountPreview();
  updateTotal();
});

// 調整金額リスナー
document.getElementById('adjustAmt').addEventListener('input', function(){
  var adj = parseInt(this.value) || 0;
  var preview = document.getElementById('adjustPreview');
  if (adj > 0) {
    preview.textContent = '追加請求: ＋¥' + adj.toLocaleString();
    preview.style.color = '#c62828';
  } else if (adj < 0) {
    preview.textContent = '値引き: −¥' + Math.abs(adj).toLocaleString();
    preview.style.color = '#2e7d32';
  } else {
    preview.textContent = '';
  }
  updateTotal();
});

// XSS helpers
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s || '').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── ログイン ─────────────────────────────────────
(function(){
  var STAFF_PASS = 'mono2024'; // ← パスワードを変更する場合はここを編集
  var SESSION_KEY = 'mono_auth';
  var overlay = document.getElementById('loginOverlay');
  var passInput = document.getElementById('loginPass');
  var loginBtn = document.getElementById('loginBtn');
  var errEl = document.getElementById('loginErr');

  function doLogin() {
    if (passInput.value === STAFF_PASS) {
      sessionStorage.setItem(SESSION_KEY, '1');
      overlay.classList.add('hidden');
      errEl.textContent = '';
      passInput.value = '';
    } else {
      errEl.textContent = 'パスワードが正しくありません';
      passInput.select();
    }
  }

  // すでにログイン済み（同セッション内）なら即座に非表示
  if (sessionStorage.getItem(SESSION_KEY) === '1') {
    overlay.classList.add('hidden');
  }

  loginBtn.addEventListener('click', doLogin);
  passInput.addEventListener('keydown', function(e){
    if (e.key === 'Enter') doLogin();
  });
})();

init();
</script>
